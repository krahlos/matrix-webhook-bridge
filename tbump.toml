[version]
current = "0.4.0"
regex = '''
  (?P<major>\d+)
  \.
  (?P<minor>\d+)
  \.
  (?P<patch>\d+)
  (?P<extra>.*)
'''

[git]
message_template = "bump version to v{new_version}"
tag_template = "v{new_version}"

[[file]]
src = "pyproject.toml"
search = 'version = "{current_version}"'

[[file]]
src = "docker-compose.yml"
search = 'ghcr.io/krahlos/matrix-webhook-bridge:v{current_version}'
