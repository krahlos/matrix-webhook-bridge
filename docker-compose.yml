---

# Docker Compose configuration for the Matrix Webhook Bridge

services:
  bridge:
    image: ghcr.io/krahlos/matrix-webhook-bridge:v0.4.0
    container_name: matrix-webhook-bridge
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - ./config/bridge.yml:/etc/matrix-webhook-bridge/bridge.yml:ro
      - ./tokens:/tokens:ro
