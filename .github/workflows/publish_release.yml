---

name: "Publish Release"
run-name: "Release ${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (vX.Y.Z)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version '${{ inputs.version }}' does not match vX.Y.Z format"
            exit 1
          fi
          echo "Version ${{ inputs.version }} is valid"

  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    needs: validate-version
    outputs:
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "${{ vars.GIT_USER_NAME }}"
          git config user.email "${{ vars.GIT_USER_EMAIL }}"

      - name: Bump version strings
        env:
          VERSION: ${{ inputs.version }}
        run: |
          VERSION_NO_V="${VERSION#v}"
          IMAGE_NAME="ghcr.io/krahlos/matrix-webhook-bridge"
          sed -i "s/^version = .*/version = \"${VERSION_NO_V}\"/" pyproject.toml
          sed -i \
            "s|${IMAGE_NAME}:v[0-9]*\.[0-9]*\.[0-9]*|${IMAGE_NAME}:${VERSION}|" \
            docker-compose.yml
          sed -i "s/VERSION=v[0-9]*\.[0-9]*\.[0-9]*/VERSION=${VERSION}/g" INSTALL.md

      - name: Commit and tag
        id: commit
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git add pyproject.toml docker-compose.yml INSTALL.md
          git commit -m "bump version to ${VERSION}"
          git tag "${VERSION}"
          git push origin main
          git push origin "${VERSION}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: bump-version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pytest .

      - name: Run tests
        run: pytest

  publish-image:
    name: Publish Image
    runs-on: ubuntu-latest
    needs: [run-tests, bump-version]
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      - name: Publish image
        uses: ./.github/actions/publish_image
        with:
          registry: ghcr.io
          image_name: ${{ github.repository }}
          version: ${{ inputs.version }}
          maintainer: ${{ vars.MAINTAINER }}
          token: ${{ secrets.GITHUB_TOKEN }}
          sha: ${{ needs.bump-version.outputs.sha }}
          server_url: ${{ github.server_url }}

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: publish-image
    steps:
      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ inputs.version }}',
              name: '${{ inputs.version }}',
              generate_release_notes: true,
            });
