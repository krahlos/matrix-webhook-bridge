---

name: "Pull Request"
run-name: "PR #${{ github.event.pull_request.number }} · ${{ github.event.pull_request.title }}"

on:
  pull_request:

permissions: {}

jobs:
  changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      dockerfile: ${{ steps.filter.outputs.dockerfile }}
      src: ${{ steps.filter.outputs.src }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            dockerfile:
              - Dockerfile
            src:
              - "matrix_webhook_bridge/**"
              - "tests/**"
              - pyproject.toml

  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [pre-commit, changes]
    if: needs.changes.outputs.src == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install ".[test]"

      - name: Run tests
        run: pytest

  build-image:
    name: Build Image
    runs-on: ubuntu-latest
    needs: [run-tests, changes]
    if: >-
      always() &&
      needs.changes.outputs.dockerfile == 'true' &&
      needs.run-tests.result != 'failure'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
