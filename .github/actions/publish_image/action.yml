---
name: "Publish Docker Image"
description: "Builds and pushes a Docker image to a container registry"

inputs:
  registry:
    description: "Container registry hostname"
    required: true
  image_name:
    description: "Full image name (e.g. owner/repo)"
    required: true
  version:
    description: "Image version tag (e.g. v1.0.0)"
    required: true
  maintainer:
    description: "Maintainer label value"
    required: false
    default: "unknown"
  token:
    description: "Registry auth token"
    required: true
  sha:
    description: "Full commit SHA for OCI revision label"
    required: true
  build_date:
    description: "ISO-8601 timestamp"
    required: true
  server_url:
    description: "GitHub server URL for OCI source label"
    required: true

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ inputs.token }}

    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile
        platforms: linux/amd64
        push: true
        build-args: |
          VERSION=${{ inputs.version }}
          MAINTAINER=${{ inputs.maintainer }}
          IMAGE_REVISION=${{ inputs.sha }}
          BUILD_DATE=${{ inputs.build_date }}
          SOURCE_URL=${{ inputs.server_url }}/${{ inputs.image_name }}
        tags: |
          ${{ inputs.registry }}/${{ inputs.image_name }}:${{ inputs.version }}
          ${{ inputs.registry }}/${{ inputs.image_name }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Summary
      shell: bash
      run: |
        echo "## Image Published" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Registry:** \`${{ inputs.registry }}/${{ inputs.image_name }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
        echo "- \`${{ inputs.version }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- \`latest\`" >> $GITHUB_STEP_SUMMARY
